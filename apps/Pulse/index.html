<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pulse – One Nation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pulse – One Nation | A calm, people-first civic idea generator." />

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #f4f6f8, #e8f0ec);
      color: #1f2d2b;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      max-width: 420px;
      background: #ffffff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 1.8rem;
      letter-spacing: 0.5px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: #4a6b65;
      margin-bottom: 20px;
    }

    .card {
      background: #f9fbfa;
      border-radius: 12px;
      padding: 18px;
      margin: 16px 0;
      min-height: 120px;
    }

    .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6b8f88;
      margin-bottom: 6px;
    }

    .value {
      font-size: 1.05rem;
      font-weight: 500;
    }

    button {
      margin-top: 16px;
      padding: 12px 18px;
      font-size: 1rem;
      border-radius: 10px;
      border: none;
      background: #2f7d6d;
      color: #ffffff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    button:hover {
      background: #256659;
    }

    footer {
      margin-top: 16px;
      font-size: 0.7rem;
      color: #7c9a94;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Pulse – One Nation</h1>
    <div class="subtitle">
      A calm moment for civic imagination.
    </div>

    <div class="card">
      <div class="label">Mood Check</div>
      <div class="value" id="mood">Click generate to begin</div>
    </div>

    <div class="card">
      <div class="label">Civic Spark</div>
      <div class="value" id="action">—</div>
    </div>

    <div class="card">
      <div class="label">Reflection</div>
      <div class="value" id="reflection">—</div>
    </div>

    <button onclick="generatePulse()">Generate Pulse</button>

    <footer>
      Sovereign • No tracking • One Nation for All
    </footer>
  </div>

  <script>
    // Monte Carlo source pools
    const moods = [
      "Overwhelmed but open",
      "Quietly hopeful",
      "Curious and reflective",
      "Frustrated yet ready",
      "Grounded and calm",
      "Creative and thoughtful"
    ];

    const actions = [
      "Check on a neighbor or elder today",
      "Support a local business or artist",
      "Read about one local issue — just once",
      "Thank a teacher, nurse, or veteran",
      "Volunteer 15 minutes of your skills",
      "Listen to someone you disagree with"
    ];

    const reflections = [
      "Change doesn’t begin loudly — it begins honestly.",
      "Community is built in small, human moments.",
      "You don’t need power to make impact.",
      "Progress is quieter than outrage, but stronger.",
      "Civic care is an act of hope.",
      "Leadership starts with listening."
    ];

    function monteCarloPick(array) {
      // Simple Monte Carlo random sampling
      let index = Math.floor(Math.random() * array.length);
      return array[index];
    }

    function generatePulse() {
      document.getElementById("mood").textContent =
        monteCarloPick(moods);

      document.getElementById("action").textContent =
        monteCarloPick(actions);

      document.getElementById("reflection").textContent =
        monteCarloPick(reflections);
    }
  </script>
</body>
</html>
